<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifikasi — TaskKampus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <div id="sidebar-container"></div>
  <main class="main">
    <div class="page-header">
      <h2>🔔 Notifikasi Deadline</h2>
      <p>Tugas yang deadline-nya dalam 3 hari ke depan</p>
    </div>
    <div id="notif-content"></div>
  </main>
</div>
<div id="top-nav-container"></div>
<script type="module">
import { requireAuth, renderSidebar, renderTopNav, sanitize, formatTanggal, toDate, getAllTugas, getNotifikasi, applyTheme } from "./js/common.js";
applyTheme();
requireAuth(async (user) => {
  const tugas = await getAllTugas(user.uid);
  const notif = getNotifikasi(tugas);
  renderSidebar("notifikasi", user.displayName || user.email, notif.length);
  renderTopNav("notifikasi", notif.length);
  const el = document.getElementById("notif-content");
  if (!notif.length) {
    el.innerHTML = `<div class="card"><div class="empty-state"><span class="icon">🎉</span><h3>Semua aman!</h3><p>Tidak ada deadline yang mendekat.</p></div></div>`;
    return;
  }
  const now = new Date();
  el.innerHTML = `<div class="card">${notif.map(n => {
    const dl = toDate(n.deadline);
    const sisaJam = Math.ceil((dl - now) / 3600000);
    const label = sisaJam <= 0 ? "⚠️ Sudah lewat!"
      : sisaJam < 24 ? `⏰ ${sisaJam} jam lagi`
      : `🗓️ ${Math.ceil(sisaJam/24)} hari lagi`;
    return `
    <div class="tugas-item prioritas-${n.prioritas}">
      <div class="tugas-info">
        <div class="tugas-judul">${sanitize(n.judul)}</div>
        <div class="tugas-matkul">${sanitize(n.mataKuliah)}</div>
        <div class="tugas-meta">
          <span>📅 ${formatTanggal(n.deadline)}</span>
          <span style="color:var(--warn);font-weight:700">${label}</span>
          <span class="badge badge-${n.prioritas}">${n.prioritas.charAt(0).toUpperCase()+n.prioritas.slice(1)}</span>
        </div>
      </div>
      <div class="tugas-actions">
        <a href="edit.html?id=${n.id}" class="btn btn-ghost btn-sm">✏️ Edit</a>
      </div>
    </div>`;
  }).join("")}</div>`;
});
</script>
</body>
</html>
