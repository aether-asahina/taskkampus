<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — TaskKampus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
<div class="auth-box">
    <div class="auth-logo">
        <h1>Task<span>Kampus</span></h1>
        <p>Manajemen Tugas Kuliah</p>
    </div>
    <div class="auth-card">
        <h2>Masuk ke Akun</h2>
        <div id="alert-box"></div>
        <form id="form-login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@kampus.ac.id" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
                Masuk →
            </button>
        </form>
    </div>
    <p class="auth-footer">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
</div>
</div>

<script type="module">
import { auth } from "./js/firebase-config.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { redirectIfLoggedIn } from "./js/common.js";

redirectIfLoggedIn();

const form = document.getElementById("form-login");
const alertBox = document.getElementById("alert-box");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.innerHTML = "";
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
    } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">Email atau password salah.</div>`;
    }
});
</script>

</body>
</html>
