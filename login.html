<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — TaskKampus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
<div class="auth-box">
  <div class="auth-logo">
    <h1>Task<span>Kampus</span></h1>
    <p>Manajemen Tugas Kuliah</p>
  </div>
  <div class="auth-card">
    <h2>Masuk ke Akun</h2>
    <div id="alert-box"></div>
    <form id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@kampus.ac.id" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <input type="checkbox" id="remember" style="width:auto;accent-color:var(--accent)">
        <label for="remember" style="text-transform:none;letter-spacing:0;font-size:13px;color:var(--muted);margin:0;cursor:pointer">Ingat saya di perangkat ini</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
        Masuk →
      </button>
    </form>
  </div>
  <div style="text-align:center;margin-top:16px">
    <button id="btn-theme" style="background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--muted);font-size:13px;cursor:pointer">
      ☀️ Mode Terang
    </button>
  </div>
  <p class="auth-footer">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
</div>
</div>
<script type="module">
import { auth } from "./js/firebase-config.js";
import { signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { redirectIfLoggedIn, toggleTheme, applyTheme } from "./js/common.js";

applyTheme();
redirectIfLoggedIn();

// Update tombol tema sesuai state saat ini
const btnTheme = document.getElementById("btn-theme");
const updateThemeBtn = () => {
  const t = localStorage.getItem("theme") || "dark";
  btnTheme.textContent = t === "dark" ? "☀️ Mode Terang" : "🌙 Mode Gelap";
};
updateThemeBtn();
btnTheme.addEventListener("click", () => { toggleTheme(); updateThemeBtn(); });

document.getElementById("form-login").addEventListener("submit", async (e) => {
  e.preventDefault();
  const alertBox = document.getElementById("alert-box");
  alertBox.innerHTML = "";
  const remember = document.getElementById("remember").checked;
  try {
    // Kalau "Ingat saya" dicentang → sesi bertahan meski browser ditutup
    // Kalau tidak → logout otomatis pas tab/browser ditutup
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
    await signInWithEmailAndPassword(auth,
      document.getElementById("email").value.trim(),
      document.getElementById("password").value
    );
    window.location.href = "dashboard.html";
  } catch {
    alertBox.innerHTML = `<div class="alert alert-error">Email atau password salah.</div>`;
  }
});
</script>
</body>
</html>
