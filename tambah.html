<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Tugas — TaskKampus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shell">
<div id="sidebar-container"></div>
<main class="main">
    <div class="page-header">
        <h2>➕ Tambah Tugas Baru</h2>
        <p>Isi detail tugas kuliah kamu</p>
    </div>
    <div class="card">
        <div id="alert-box"></div>
        <form id="form-tambah">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Judul Tugas</label>
                    <input type="text" id="judul" placeholder="Contoh: Laporan Praktikum Algoritma" required>
                </div>
                <div class="form-group">
                    <label>Mata Kuliah</label>
                    <input type="text" id="mataKuliah" placeholder="Contoh: Analisis Algoritma" required>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="datetime-local" id="deadline" required>
                </div>
                <div class="form-group">
                    <label>Prioritas</label>
                    <select id="prioritas">
                        <option value="rendah">🟢 Rendah</option>
                        <option value="sedang" selected>🟡 Sedang</option>
                        <option value="tinggi">🔴 Tinggi</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Deskripsi (opsional)</label>
                    <textarea id="deskripsi" placeholder="Detail tugas, catatan tambahan..."></textarea>
                </div>
            </div>
            <div style="display:flex;gap:10px">
                <button type="submit" class="btn btn-primary">💾 Simpan Tugas</button>
                <a href="dashboard.html" class="btn btn-ghost">Batal</a>
            </div>
        </form>
    </div>
</main>
</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import { collection, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import { requireAuth, renderSidebar, getAllTugas, getNotifikasi } from "./js/common.js";

requireAuth(async (user) => {
    const tugas = await getAllTugas(user.uid);
    const notif = getNotifikasi(tugas);
    renderSidebar("tambah", user.displayName || user.email, notif.length);

    document.getElementById("form-tambah").addEventListener("submit", async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById("alert-box");
        alertBox.innerHTML = "";

        const judul     = document.getElementById("judul").value.trim();
        const mataKuliah = document.getElementById("mataKuliah").value.trim();
        const deadline  = document.getElementById("deadline").value;
        const prioritas = document.getElementById("prioritas").value;
        const deskripsi = document.getElementById("deskripsi").value.trim();

        try {
            await addDoc(collection(db, "tugas"), {
                uid: user.uid,
                judul,
                mataKuliah,
                deskripsi,
                deadline: Timestamp.fromDate(new Date(deadline)),
                prioritas,
                status: "belum",
                createdAt: Timestamp.now()
            });
            window.location.href = "dashboard.html";
        } catch (err) {
            alertBox.innerHTML = `<div class="alert alert-error">Gagal menyimpan: ${err.message}</div>`;
        }
    });
});
</script>

</body>
</html>
